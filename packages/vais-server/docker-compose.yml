version: "3.9"

networks:
  vais-net:
    driver: bridge

volumes:
  vaisdb-data:

services:

  vaisdb:
    build:
      context: ../vaisdb
    image: vaisdb:local
    container_name: vaisdb
    ports:
      - "5433:5433"
    environment:
      VAISDB_PORT: "5433"
      VAISDB_ENV: production
    volumes:
      - vaisdb-data:/var/lib/vaisdb
    networks:
      - vais-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5433/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  vais-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: vais-server:local
    container_name: vais-server
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: production
      VAISDB_HOST: vaisdb
      VAISDB_PORT: "5433"
    networks:
      - vais-net
    depends_on:
      vaisdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
