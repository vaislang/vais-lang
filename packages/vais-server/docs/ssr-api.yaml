openapi: "3.0.0"
info:
  title: vais-server SSR Bridge API
  version: "1.0.0"
  description: >
    HTTP contract between vais-web (TypeScript SSR client) and
    vais-server (Vais backend).  All endpoints live under /api.

servers:
  - url: "http://localhost:8080"
    description: Local development server

paths:
  /api/render:
    post:
      summary: SSR render request
      description: >
        Accepts a route and serialised props, performs server-side rendering,
        and returns the rendered HTML together with any <head> content and an
        HTTP status code that should be forwarded to the end client.
      operationId: renderPage
      tags:
        - ssr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequest"
      responses:
        "200":
          description: Render succeeded (or produced a handled error page)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResponse"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/hydrate:
    post:
      summary: Hydration data request
      description: >
        Returns the serialised page data needed for client-side hydration
        after an SSR response has been delivered.  The payload mirrors the
        props used during rendering so the client can rehydrate without a
        second round-trip.
      operationId: hydrateData
      tags:
        - ssr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HydrateRequest"
      responses:
        "200":
          description: Hydration data returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HydrateResponse"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/health:
    get:
      summary: Health check
      description: Returns 200 when the server is ready to handle requests.
      operationId: healthCheck
      tags:
        - ops
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Server is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RenderRequest:
      type: object
      required:
        - route
        - props
      properties:
        route:
          type: string
          description: URL path to render, e.g. "/blog/hello"
          example: "/blog/hello"
        props:
          type: string
          description: JSON-encoded props object to pass to the page component
          example: '{"slug":"hello","title":"Hello World"}'

    RenderResponse:
      type: object
      required:
        - html
        - head
        - status
      properties:
        html:
          type: string
          description: Fully rendered HTML body content
        head:
          type: string
          description: HTML <head> fragment (title, meta, link tags, etc.)
        status:
          type: integer
          format: int64
          description: HTTP status code to forward to the end client
          example: 200

    HydrateRequest:
      type: object
      required:
        - route
        - props
      properties:
        route:
          type: string
          description: URL path that was rendered server-side
          example: "/blog/hello"
        props:
          type: string
          description: JSON-encoded props used during SSR
          example: '{"slug":"hello"}'

    HydrateResponse:
      type: object
      required:
        - data
        - route
      properties:
        data:
          type: string
          description: JSON-encoded page data for hydration
        route:
          type: string
          description: Resolved route path

    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          enum:
            - ok
          example: ok
        version:
          type: string
          description: Server version string
          example: "0.1.0"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Missing required field: route"
