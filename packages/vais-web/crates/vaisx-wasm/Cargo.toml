[package]
name = "vaisx-wasm"
description = "WASM bindings for VaisX parser + compiler — exposes parse() and compile() to JS"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vaisx-parser = { path = "../vaisx-parser" }
vaisx-compiler = { path = "../vaisx-compiler" }
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
wasm-bindgen-test = "0.3"
