<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VaisX API Reference — Full documentation for @vaisx/runtime, @vaisx/kit, and more." />
  <title>API Reference — VaisX Docs</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="stylesheet" href="/src/styles/prism-theme.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header" role="banner">
      <div class="header-inner">
        <a href="/" class="header-logo" aria-label="VaisX home">
          <span class="logo-mark" aria-hidden="true">⬡</span>
          <span class="logo-text">VaisX</span>
          <span class="logo-badge">docs</span>
        </a>
        <nav class="header-nav" aria-label="Main navigation">
          <a href="/guide/" class="header-nav__link">Guide</a>
          <a href="/tutorial/" class="header-nav__link">Tutorial</a>
          <a href="/api/" class="header-nav__link">API</a>
        </nav>
        <div class="header-actions">
          <button id="theme-toggle" class="btn-icon" aria-label="Toggle color scheme" title="Toggle color scheme">☾</button>
          <a href="https://github.com/vaislang/vais-web" class="btn-icon" aria-label="GitHub repository" target="_blank" rel="noopener noreferrer">⌥</a>
        </div>
      </div>
    </header>

    <div class="app-body">
      <aside class="app-sidebar" id="sidebar-root">
        <!-- Sidebar injected by JS -->
      </aside>

      <main class="app-content" id="main-content">
        <div class="content-wrapper" id="doc-content">
          <div class="placeholder">
            <div class="placeholder__icon" aria-hidden="true">📚</div>
            <h1 class="placeholder__title">API Reference</h1>
            <p class="placeholder__desc">
              Full auto-generated API documentation for every VaisX package will
              be available here.
            </p>
            <span class="placeholder__badge">Coming soon</span>
            <p style="margin-top:1.5rem">
              <a href="/" class="btn btn-secondary">← Back to home</a>
            </p>
          </div>
        </div>
      </main>
    </div>

    <footer class="app-footer" role="contentinfo">
      <div class="footer-inner">
        <p class="footer-copy">&copy; 2026 VaisX contributors &mdash; MIT License</p>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="/guide/">Guide</a>
          <a href="/tutorial/">Tutorial</a>
          <a href="/api/">API</a>
          <a href="https://github.com/vaislang/vais-web" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script type="module" src="/src/pages/section-init.ts"></script>
</body>
</html>
